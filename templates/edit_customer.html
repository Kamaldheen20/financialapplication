<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Edit Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<div class="card shadow">

<div class="card-header">

<h3>

Edit Customer

</h3>

</div>

<div class="card-body">

<form method="POST">

<label class="form-label">

Customer ID

</label>

<input
class="form-control mb-3"
value="{{ customer.customer_id }}"
readonly>

<label class="form-label">

Customer Name

</label>

<input
name="name"
class="form-control mb-3"
value="{{ customer.name }}"
required>

<label class="form-label">
Mobile
</label>

<input
name="mobile"
class="form-control mb-3"
value="{{ customer.mobile }}">

<label class="form-label">
Address
</label>

<textarea
name="address"
class="form-control mb-3"
rows="3">{{ customer.address or '' }}</textarea>
Loan Amount

</label>

<input
type="number"
step="0.01"
name="loan_amount"
class="form-control mb-3"
value="{{ customer.loan_amount }}"
required>

<label class="form-label">

Daily Due

</label>

<input
type="number"
step="0.01"
name="daily_due"
class="form-control mb-3"
value="{{ customer.daily_due }}"
required>

<button
class="btn btn-success">

Update Customer

</button>

<a
href="/customer_ledger"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
