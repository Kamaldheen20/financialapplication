<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Collection Manager - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .login-card{
        border: none;
        border-radius: 15px;
        overflow: hidden;
    }

    .logo{
        width: 120px;
        height: auto;
    }

    .card-header{
        background: white;
        border-bottom: none;
    }

    .app-title{
        font-weight: bold;
        color: #0d6efd;
    }

    .subtitle{
        color: #6c757d;
        font-size: 14px;
    }

</style>


</head>

<body>

<div class="container">


<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg login-card">

            <div class="card-header text-center pt-4">

                <img
                    src="{{ url_for('static', filename='images/logo.png') }}"
                    alt="FCM Logo"
                    class="logo mb-3">

                <h3 class="app-title">
                    Finance Collection Manager
                </h3>

                <p class="subtitle">
                    Secure Finance Collection System
                </p>

            </div>

            <div class="card-body p-4">

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-danger">
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}

                <form method="POST">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control mb-3"
                        placeholder="Enter Username"
                        required>

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-4"
                        placeholder="Enter Password"
                        required>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <div class="text-center mt-4">

                    <a href="/register" class="text-decoration-none">
                        Create New Account
                    </a>

                </div>

            </div>

        </div>

        <div class="text-center mt-3 text-white">

            <small>
                Finance Collection Manager v1.0
            </small>

        </div>

    </div>

</div>

</div>

</body>

</html>
