<!DOCTYPE html>
<html>

<head>

<title>Company Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

Company Settings

</h3>

</div>

<div class="card-body">

<form method="POST">

<label>

Company Name

</label>

<input
type="text"
name="company_name"
class="form-control mb-3"
value="{{ settings.company_name or '' }}">

<label>

Address

</label>

<textarea
name="address"
class="form-control mb-3">{{ settings.address or '' }}</textarea>

<label>

Phone Number

</label>

<input
type="text"
name="phone"
class="form-control mb-3"
value="{{ settings.phone or '' }}">

<button
class="btn btn-success">

Save Settings

</button>

<a
href="/dashboard"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>
